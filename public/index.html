<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chaos Pizza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/utils.js"></script>
  </head>
  <body class="bg-gray-100 text-gray-900">
    <div class="max-w-6xl mx-auto p-8">
      <h1 class="text-3xl font-bold mb-10">🍕 Chaos Pizza</h1>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
        <!-- LEFT -->
        <div class="md:col-span-2 space-y-6">
          <h2 class="text-lg font-semibold">Select your pizzas</h2>
          <div id="pizzaList" class="space-y-3"></div>

          <!-- Promo -->
          <div>
            <input
              id="promo"
              type="text"
              placeholder="Promo code"
              class="w-64 border rounded px-4 py-2"
            />
          </div>
        </div>

        <!-- RIGHT -->
        <div class="bg-white rounded-xl shadow p-6 h-fit">
          <h2 class="text-lg font-semibold mb-4">Order Summary</h2>

          <div id="cartItems" class="space-y-2 mb-4">
            <p class="text-gray-400 text-sm italic" id="emptyCartMsg">Your cart is empty</p>
          </div>

          <hr class="my-4" />

          <div class="flex flex-col gap-4">
            <div class="flex flex-col gap-2">
              <div class="flex justify-between italic">
                <span>Total HT</span>
                <span id="totalHT">—</span>
              </div>

              <div class="flex justify-between italic">
                <span>Total TVA (<span id="tvaRateDisplay">—</span>%)</span>
                <span id="totalTVA">—</span>
              </div>
            </div>

            <div class="flex justify-between font-bold text-lg">
              <span>Total TTC</span>
              <span id="totalTTC">—</span>
            </div>
          </div>

          <button
            onclick="placeOrder()"
            class="mt-6 w-full bg-black text-white py-3 rounded-lg hover:bg-gray-800"
          >
            Place Order
          </button>

          <pre
            id="result"
            class="mt-4 bg-gray-900 text-green-400 text-xs p-3 rounded overflow-auto hidden"
          ></pre>
        </div>
      </div>
    </div>

    <script>
      let pizzas = [];
      let cart = []; // { pizzaId, name, price, qty }
      let config = null;

      fetch("/config")
        .then((r) => r.json())
        .then((data) => {
          config = data;
          updateSummary();
        });

      fetch("/pizzas")
        .then((r) => r.json())
        .then((data) => {
          pizzas = data;
          renderPizzas();
        });

      function renderPizzas() {
        const list = document.getElementById("pizzaList");
        list.innerHTML = "";

        pizzas.forEach((p) => {
          const div = document.createElement("div");
          div.className =
            "flex justify-between items-center p-4 bg-white rounded-lg border hover:bg-gray-50";
          div.innerHTML = `
            <div class="flex-1">
              <span class="font-medium pizza-name"></span>
              <span class="text-gray-500 ml-2 pizza-price"></span>
            </div>
            <div class="flex items-center gap-2">
              <button onclick="changeCartQty(${p.id}, -1)" class="px-2 py-1 border rounded text-sm hover:bg-gray-100" title="Remove one">−</button>
              <span id="cartQty-${p.id}" class="w-8 text-center font-mono pizza-qty"></span>
              <button onclick="changeCartQty(${p.id}, 1)" class="px-2 py-1 border rounded text-sm hover:bg-gray-100" title="Add one">+</button>
            </div>
          `;

          const nameEl = div.querySelector(".pizza-name");
          const priceEl = div.querySelector(".pizza-price");
          const qtyEl = div.querySelector(".pizza-qty");

          if (nameEl) {
            nameEl.textContent = p.name;
          }
          if (priceEl) {
            priceEl.textContent = `${p.price}€`;
          }
          if (qtyEl) {
            qtyEl.textContent = getCartQty(p.id);
          }

          list.appendChild(div);
        });
      }

      function getCartQty(pizzaId) {
        const item = cart.find((c) => c.pizzaId === pizzaId);
        return item ? item.qty : 0;
      }

      function changeCartQty(pizzaId, delta) {
        const pizza = pizzas.find((p) => p.id === pizzaId);
        if (!pizza) return;

        const existing = cart.find((c) => c.pizzaId === pizzaId);

        if (existing) {
          existing.qty += delta;
          if (existing.qty <= 0) {
            // Remove from cart
            cart = cart.filter((c) => c.pizzaId !== pizzaId);
          }
        } else if (delta > 0) {
          cart.push({ pizzaId: pizza.id, name: pizza.name, price: pizza.price, qty: delta });
        }

        // Update the counter in the pizza list
        const qtyEl = document.getElementById(`cartQty-${pizzaId}`);
        if (qtyEl) {
          qtyEl.innerText = getCartQty(pizzaId);
        }

        updateSummary();
      }

      function removeFromCart(pizzaId) {
        cart = cart.filter((c) => c.pizzaId !== pizzaId);

        // Update the counter in the pizza list
        const qtyEl = document.getElementById(`cartQty-${pizzaId}`);
        if (qtyEl) {
          qtyEl.innerText = 0;
        }

        updateSummary();
      }

      function updateSummary() {
        const cartItemsEl = document.getElementById("cartItems");

        if (cart.length === 0) {
          cartItemsEl.innerHTML = '<p class="text-gray-400 text-sm italic" id="emptyCartMsg">Your cart is empty</p>';
          document.getElementById("totalHT").innerText = "—";
          document.getElementById("totalTVA").innerText = "—";
          document.getElementById("totalTTC").innerText = "—";
          document.getElementById("tvaRateDisplay").innerText = config ? config.TVA_RATE * 100 : "—";
          return;
        }

        // Render cart items
        cartItemsEl.innerHTML = "";
        cart.forEach((item) => {
          const row = document.createElement("div");
          row.className = "flex justify-between items-center text-sm";

          const leftDiv = document.createElement("div");
          leftDiv.className = "flex items-center gap-2";

          const removeButton = document.createElement("button");
          removeButton.className = "text-red-400 hover:text-red-600 text-xs";
          removeButton.title = "Remove";
          removeButton.textContent = "✕";
          removeButton.onclick = function () {
            removeFromCart(item.pizzaId);
          };

          const nameSpan = document.createElement("span");
          nameSpan.textContent = `${item.name} x${item.qty}`;

          leftDiv.appendChild(removeButton);
          leftDiv.appendChild(nameSpan);

          const priceSpan = document.createElement("span");
          priceSpan.textContent = `${formatPrice(round(item.price * item.qty))}`;

          row.appendChild(leftDiv);
          row.appendChild(priceSpan);

          cartItemsEl.appendChild(row);
        });

        // Calculate totals
        let totalHT = 0;
        cart.forEach((item) => {
          totalHT += item.price * item.qty;
        });

        const tvaRate = config ? config.TVA_RATE : 0.1;
        const totalTVA = totalHT * tvaRate;
        const totalTTC = totalHT + totalTVA;

        document.getElementById("totalHT").innerText = formatPrice(round(totalHT));
        document.getElementById("totalTVA").innerText = formatPrice(round(totalTVA));
        document.getElementById("totalTTC").innerText = formatPrice(round(totalTTC));
        document.getElementById("tvaRateDisplay").innerText = tvaRate * 100;
      }

      function placeOrder() {
        if (cart.length === 0) return;

        const email = window.prompt("Please enter your email address for order confirmation:");
        if (!email) {
          return;
        }

        const items = cart.map((c) => ({ pizzaId: c.pizzaId, qty: c.qty }));

        fetch("/orders", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            items: items,
            promoCode: document.getElementById("promo").value,
            email: email,
          }),
        })
          .then((r) => {
            if (!r.ok) {
              // Try to extract a useful error message from the response body, if any
              return r
                .json()
                .then((err) => {
                  const message =
                    err && typeof err === "object" && err.message
                      ? err.message
                      : "Failed to place order.";
                  throw new Error(message);
                })
                .catch(() => {
                  // If parsing the error body fails, fall back to a generic message
                  throw new Error("Failed to place order.");
                });
            }
            return r.json();
          })
          .then((data) => {
            document.getElementById("result").innerText = JSON.stringify(
              data,
              null,
              2,
            );
            document.getElementById("result").classList.remove("hidden");
          })
          .catch((err) => {
            // Surface the error without revealing the success result area
            alert(err && err.message ? err.message : "Failed to place order.");
          });
      }
    </script>
  </body>
</html>
